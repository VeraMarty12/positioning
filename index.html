<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Практика позиционирования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="logos-container">
        <div class="logo-item">
            <div class="logo-mickey">
                <div class="head"></div>
                <div class="ear left"></div>
                <div class="ear right"></div>
            </div>
        </div>

        <div class="logo-item">
            <div class="logo-circle"></div>
        </div>
    </div>

    <button id="openModalBtn" class="lightbox-btn">Открыть модальное окно</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="progress">
                <div class="bar" id="progressBar"></div>
                <div class="text text-black">Loading...</div>
                <div class="text text-white">Loading...</div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
